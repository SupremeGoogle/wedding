<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель | Диана и Виктор</title>
  <style>
    :root {
      --deep: #3D2B27;
      --gold: #C8AC88;
      --cream: #F5EDE3;
      --serif: "Cormorant Garamond", serif;
      --body: "Inter", sans-serif;
    }
    body {
      margin: 0;
      font-family: var(--body);
      background: var(--cream);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-box {
      background: #fff;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      text-align: center;
      width: min(400px, 90%);
    }
    h2 { font-family: var(--serif); color: var(--deep); }
    input {
      width: 100%;
      padding: 12px;
      margin: 20px 0;
      border: 1px solid #ddd;
      border-radius: 12px;
      box-sizing: border-box;
      font-size: 1rem;
      text-align: center;
    }
    button {
      background: var(--deep);
      color: #fff;
      border: none;
      padding: 12px 30px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
    }

    .admin-container {
      display: none;
      width: 95%;
      max-width: 1100px;
      background: #fff;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.1);
      flex-direction: column;
      margin: 40px auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      border-bottom: 1px solid #eee;
      padding-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }
    th, td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid #f5f5f5;
    }
    th { background: #fafafa; color: var(--deep); font-weight: 600; }
    .actions { display: flex; gap: 16px; }
    .btn-clear { background: #fee2e2; color: #b91c1c; }
    .btn-export { background: var(--gold); }
  </style>
</head>
<body>

  <div class="login-box" id="loginBox">
    <h2>Вход в управление</h2>
    <input type="password" id="passInput" placeholder="Пароль">
    <button onclick="checkPass()">Войти</button>
  </div>

  <div class="admin-container" id="adminContainer">
    <div class="header">
      <h2>Ответы гостей</h2>
      <div class="actions">
        <button class="btn-export" onclick="exportCSV()">Скачать CSV</button>
        <button class="btn-clear" onclick="clearData()">Очистить всё</button>
      </div>
    </div>

    <div style="overflow-x: auto;">
      <table id="responsesTable">
        <thead>
          <tr>
            <th>Дата/Время</th>
            <th>Имя</th>
            <th>Присутствие</th>
            <th>Напитки</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    function checkPass() {
      const pass = document.getElementById('passInput').value;
      if (pass === '123!') {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminContainer').style.display = 'flex';
        renderTable();
      } else {
        alert('Неверный пароль');
      }
    }

    function renderTable() {
      const responses = JSON.parse(localStorage.getItem('wedding_responses') || '[]');
      const tbody = document.querySelector('#responsesTable tbody');
      tbody.innerHTML = responses.map(r => `
        <tr>
          <td>${r.timestamp}</td>
          <td>${r.name}</td>
          <td>${r.attendance}</td>
          <td>${r.drinks}</td>
        </tr>
      `).join('') || '<tr><td colspan="4" style="text-align:center">Ответов пока нет</td></tr>';
    }

    function clearData() {
      if (confirm('Удалить все ответы?')) {
        localStorage.removeItem('wedding_responses');
        renderTable();
      }
    }

    function exportCSV() {
      const responses = JSON.parse(localStorage.getItem('wedding_responses') || '[]');
      if (!responses.length) return alert('Нет данных');
      
      let csv = 'Дата/Время;Имя;Присутствие;Напитки\n';
      responses.forEach(r => {
        csv += `${r.timestamp};${r.name};${r.attendance};${r.drinks}\n`;
      });
      
      const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "responses.csv";
      link.click();
    }
  </script>
</body>
</html>
