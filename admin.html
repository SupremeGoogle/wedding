<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель | Диана и Виктор</title>
  <style>
    :root {
      --deep: #3D2B27;
      --gold: #C8AC88;
      --cream: #F5EDE3;
      --serif: "Cormorant Garamond", serif;
      --body: "Inter", sans-serif;
    }
    body {
      margin: 0;
      font-family: var(--body);
      background: var(--cream);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-box {
      background: #fff;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      text-align: center;
      width: min(400px, 90%);
    }
    h2 { font-family: var(--serif); color: var(--deep); }
    input {
      width: 100%;
      padding: 12px;
      margin: 20px 0;
      border: 1px solid #ddd;
      border-radius: 12px;
      box-sizing: border-box;
      font-size: 1rem;
      text-align: center;
    }
    button {
      background: var(--deep);
      color: #fff;
      border: none;
      padding: 12px 30px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
    }

    .admin-container {
      display: none;
      width: 95%;
      max-width: 1100px;
      background: #fff;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.1);
      flex-direction: column;
      margin: 40px auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      border-bottom: 1px solid #eee;
      padding-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }
    th, td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid #f5f5f5;
    }
    th { background: #fafafa; color: var(--deep); font-weight: 600; }
    .actions { display: flex; gap: 16px; }
    .btn-clear { background: #fee2e2; color: #b91c1c; }
    .btn-export { background: var(--gold); }
    .btn-refresh {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 130px;
    }
    .refresh-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.45);
      border-top-color: #fff;
      border-radius: 50%;
      display: none;
    }
    .btn-refresh.is-loading {
      opacity: 0.85;
      cursor: wait;
    }
    .btn-refresh.is-loading .refresh-spinner {
      display: inline-block;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-box" id="loginBox">
    <h2>Вход в управление</h2>
    <input type="password" id="passInput" placeholder="Пароль">
    <button onclick="checkPass()">Войти</button>
  </div>

  <div class="admin-container" id="adminContainer">
    <div class="header">
      <h2>Ответы гостей</h2>
      <div class="actions">
        <button class="btn-export btn-refresh" id="refreshBtn" onclick="refreshData()"><span class="refresh-spinner" aria-hidden="true"></span><span id="refreshBtnLabel">Обновить</span></button>
        <button class="btn-export" onclick="exportCSV()">Скачать CSV</button>
      </div>
    </div>

    <div style="overflow-x: auto;">
      <table id="responsesTable">
        <thead>
          <tr>
            <th>Дата/Время</th>
            <th>Имя</th>
            <th>Присутствие</th>
            <th>Напитки</th>
            <th>Музыка</th>
            <th>Действие</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="header" style="margin-top: 24px;">
      <h2>Результаты квеста</h2>
    </div>
    <div style="overflow-x: auto;">
      <table id="quizTable">
        <thead>
          <tr>
            <th>Игрок</th>
            <th>Очки</th>
            <th>Время</th>
            <th>Верно</th>
            <th>Букеты</th>
            <th>Действие</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
  <script src="api-config.js"></script>
  <script>
    const API_URL = (window.WEDDING_API_URL || '').trim();
    let currentRows = [];
    let currentQuizRows = [];

    function setRefreshLoading(isLoading) {
      const btn = document.getElementById('refreshBtn');
      const label = document.getElementById('refreshBtnLabel');
      if (!btn || !label) return;
      btn.disabled = !!isLoading;
      btn.classList.toggle('is-loading', !!isLoading);
      label.textContent = isLoading ? 'Обновление...' : 'Обновить';
    }

    function checkPass() {
      const pass = document.getElementById('passInput').value;
      if (pass === '123!') {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminContainer').style.display = 'flex';
        refreshData();
      } else {
        alert('Неверный пароль');
      }
    }

    function esc(v) {
      return String(v || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function isQuizFallbackRow(r) {
      return r && r.attendance === 'QUIZ' && typeof r.music === 'string' && r.music.indexOf('__QUIZ__') === 0;
    }

    function parseQuizFallbackFromResponses(rows) {
      const parsed = [];
      (rows || []).forEach(r => {
        if (!isQuizFallbackRow(r)) return;
        try {
          parsed.push(JSON.parse(r.music.slice('__QUIZ__'.length)));
        } catch (e) {
        }
      });
      return parsed;
    }

    async function loadRows() {
      if (!API_URL) {
        const local = JSON.parse(localStorage.getItem('wedding_responses') || '[]');
        currentRows = local.filter(r => !isQuizFallbackRow(r)).map(r => ({
          responseId: String(r.id || ''),
          timestamp: r.timestamp || '',
          name: r.name || '',
          attendance: r.attendance || '',
          drinks: r.drinks || '',
          music: r.music || ''
        })).reverse();
        renderTable(currentRows);
        return;
      }

      try {
        const res = await fetch(API_URL + '?action=list', { method: 'GET' });
        const contentType = (res.headers.get('content-type') || '').toLowerCase();
        if (!res.ok || contentType.indexOf('application/json') === -1) {
          throw new Error('API_NON_JSON_OR_PRIVATE');
        }
        const data = await res.json();
        currentRows = (data.responses || []).filter(r => !isQuizFallbackRow(r)).map(r => ({
          responseId: r.responseId || '',
          fingerprint: r.fingerprint || '',
          timestamp: r.timestamp || '',
          name: r.name || '',
          attendance: r.attendance || '',
          drinks: r.drinks || '',
          music: r.music || ''
        }));
        renderTable(currentRows);
      } catch (err) {
        console.error(err);
        const local = JSON.parse(localStorage.getItem('wedding_responses') || '[]');
        currentRows = local.filter(r => !isQuizFallbackRow(r)).map(r => ({
          responseId: String(r.id || ''),
          timestamp: r.timestamp || '',
          name: r.name || '',
          attendance: r.attendance || '',
          drinks: r.drinks || '',
          music: r.music || ''
        })).reverse();
        renderTable(currentRows);
        alert('Не удалось загрузить ответы из Google Sheets. Проверьте Apps Script: доступ Web app = Anyone и активный deployment /exec. Показаны только локальные данные этого браузера.');
      }
    }

    function formatMs(ms) {
      const sec = Math.max(0, Math.floor((Number(ms) || 0) / 1000));
      const m = String(Math.floor(sec / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    async function loadQuizRows() {
      if (!API_URL) {
        currentQuizRows = [];
        renderQuizTable(currentQuizRows);
        return;
      }
      try {
        const res = await fetch(API_URL + '?action=quiz_list', { method: 'GET' });
        const contentType = (res.headers.get('content-type') || '').toLowerCase();
        if (!res.ok || contentType.indexOf('application/json') === -1) {
          throw new Error('QUIZ_API_UNAVAILABLE');
        }
        const data = await res.json();
        if (Array.isArray(data.results)) {
          currentQuizRows = data.results.map(r => ({
            sessionId: r.sessionId || '',
            fingerprint: r.fingerprint || '',
            playerName: r.playerName || '',
            totalScore: Number(r.totalScore || 0),
            timeMs: Number(r.timeMs || 0),
            correctCount: Number(r.correctCount || 0),
            bouquetHits: Number(r.bouquetHits || 0)
          }));
          renderQuizTable(currentQuizRows);
          return;
        }

        const listRes = await fetch(API_URL + '?action=list', { method: 'GET' });
        const listData = await listRes.json();
        currentQuizRows = parseQuizFallbackFromResponses(listData.responses || []).map(r => ({
          sessionId: r.sessionId || '',
          fingerprint: r.fingerprint || '',
          playerName: r.playerName || '',
          totalScore: Number(r.totalScore || 0),
          timeMs: Number(r.timeMs || 0),
          correctCount: Number(r.correctCount || 0),
          bouquetHits: Number(r.bouquetHits || 0)
        }));
        renderQuizTable(currentQuizRows);
      } catch (err) {
        console.error(err);
        renderQuizTable([]);
      }
    }

    async function refreshData() {
      setRefreshLoading(true);
      try {
        await Promise.all([loadRows(), loadQuizRows()]);
      } finally {
        setRefreshLoading(false);
      }
    }

    function renderTable(rows) {
      const tbody = document.querySelector('#responsesTable tbody');
      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${esc(r.timestamp)}</td>
          <td>${esc(r.name)}</td>
          <td>${esc(r.attendance)}</td>
          <td>${esc(r.drinks)}</td>
          <td>${esc(r.music || '—')}</td>
          <td><button onclick="deleteRow('${esc(r.responseId)}','${esc(r.fingerprint || '')}')">Удалить</button></td>
        </tr>
      `).join('') || '<tr><td colspan="6" style="text-align:center">Ответов пока нет</td></tr>';
    }

    function renderQuizTable(rows) {
      const tbody = document.querySelector('#quizTable tbody');
      if (!tbody) return;
      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${esc(r.playerName || 'Гость')}</td>
          <td>${esc(r.totalScore)}</td>
          <td>${esc(formatMs(r.timeMs))}</td>
          <td>${esc(r.correctCount)}</td>
          <td>${esc(r.bouquetHits)}</td>
          <td><button onclick="deleteQuizRow('${esc(r.sessionId)}','${esc(r.fingerprint || '')}')">Удалить</button></td>
        </tr>
      `).join('') || '<tr><td colspan="6" style="text-align:center">Результатов пока нет</td></tr>';
    }

    async function deleteRow(responseId, fingerprint) {
      if (!confirm('Удалить эту запись?')) return;

      if (!API_URL) {
        const raw = JSON.parse(localStorage.getItem('wedding_responses') || '[]');
        const next = raw.filter(r => String(r.id || '') !== String(responseId));
        localStorage.setItem('wedding_responses', JSON.stringify(next));
        loadRows();
        return;
      }

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'delete', responseId, fingerprint })
        });
        const contentType = (res.headers.get('content-type') || '').toLowerCase();
        if (!res.ok || contentType.indexOf('application/json') === -1) {
          throw new Error('Delete API unavailable/private');
        }
        const data = await res.json();
        if (!data.ok) throw new Error('Delete failed');
        loadRows();
      } catch (err) {
        console.error(err);
        alert('Не удалось удалить запись.');
      }
    }

    async function deleteQuizRow(sessionId, fingerprint) {
      if (!confirm('Удалить результат квеста?')) return;
      if (!API_URL) return;
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'quiz_delete', sessionId, fingerprint })
        });
        const contentType = (res.headers.get('content-type') || '').toLowerCase();
        if (!res.ok || contentType.indexOf('application/json') === -1) {
          throw new Error('Quiz delete unavailable');
        }
        const data = await res.json();
        if (!data.ok) throw new Error('Quiz delete failed');
        loadQuizRows();
      } catch (err) {
        console.error(err);
        alert('Не удалось удалить результат квеста.');
      }
    }

    function exportCSV() {
      const responses = currentRows;
      if (!responses.length) return alert('Нет данных');
      
      let csv = 'Дата/Время;Имя;Присутствие;Напитки;Музыка\n';
      responses.forEach(r => {
        csv += `${r.timestamp};${r.name};${r.attendance};${r.drinks};${r.music || ''}\n`;
      });
      
      const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "responses.csv";
      link.click();
    }
  </script>
</body>
</html>
